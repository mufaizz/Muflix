<script>
        // Subtle Mouse parallax for posters
        document.addEventListener('mousemove', (e) => {
            const grid = document.querySelector('.poster-grid');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            grid.style.transform = `rotate(-10deg) scale(1.5) translate(${x}px, ${y}px)`;
        });

        // Button interaction sounds/haptics simulation
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Potential for haptic feedback or sound triggers
                console.log('Action triggered:', btn.innerText);
            });
        });
    </script>
